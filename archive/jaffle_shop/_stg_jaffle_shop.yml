models:
  - name: stg_jaffle_shop__customers
    description: one unique customer per row

    columns:
      - name: customer_id
        description: the primary key
        data_tests:
        - unique
        - not_null

  - name: stg_jaffle_shop__orders
    description: This model represents orders placed by customers, capturing essential details such as order date, status, and customer association. It serves as a foundational dataset for analyzing order trends and customer purchasing behavior.
    columns:
      - name: order_id
        description: A unique identifier for each order.
        data_tests:
         - unique
         - not_null 
      - name: order_status
        description: "{{ doc('order_status')}}"
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
      - name: customer_id
        description: References the unique identifier of the customer who placed the order.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
               

        
  
      - name: order_date
        description: The date when the order was placed.
        data_tests:
          - not_null
      - name: _etl_loaded_at
        description: Timestamp indicating when the record was loaded into the data warehouse.
        data_tests:
          - not_null
